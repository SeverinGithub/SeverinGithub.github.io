<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@100,400;100,500;100,600;100,700;125,700;125,800;125,900&display=swap');

/* ── tokens & themes ── */
:root {
  --font: 'Archivo', system-ui, -apple-system, sans-serif;
  --r-sm: 12px; --r-md: 18px; --r-lg: 26px; --r-xl: 34px;
  --ease: cubic-bezier(.22,1,.36,1);
}
[data-theme="fairway"] {
  --bg: #E9EFE8; --bg-2: #DFE7DD; --surface: #FFFFFF; --surface-2: #F0F4EF;
  --ink: #112019; --ink-soft: #586a60; --ink-faint: #93a199;
  --line: rgba(17,32,25,.09); --line-strong: rgba(17,32,25,.16);
  --primary: #11824A; --primary-strong: #0C6038; --on-primary: #FFFFFF;
  --accent: #B7ED3C; --accent-ink: #1d2b07; --under: #11824A; --over: #C9603A;
  --shadow-sm: 0 1px 2px rgba(17,32,25,.06), 0 4px 12px rgba(17,32,25,.05);
  --shadow-md: 0 2px 6px rgba(17,32,25,.07), 0 16px 36px rgba(17,32,25,.09);
}
[data-theme="midnight"] {
  --bg: #0A120E; --bg-2: #0E1813; --surface: #15211B; --surface-2: #1D2C24;
  --ink: #ECF4EE; --ink-soft: #9cb0a5; --ink-faint: #647a6e;
  --line: rgba(255,255,255,.08); --line-strong: rgba(255,255,255,.16);
  --primary: #2ECC71; --primary-strong: #25A85E; --on-primary: #04130A;
  --accent: #C7F24B; --accent-ink: #10200a; --under: #2ECC71; --over: #F0875A;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,.45), 0 18px 40px rgba(0,0,0,.4);
}
[data-theme="links"] {
  --bg: #0E3D2A; --bg-2: #0B3323; --surface: #134A33; --surface-2: #0C3A28;
  --ink: #F5F1E2; --ink-soft: #b9caba; --ink-faint: #82997f;
  --line: rgba(245,241,226,.13); --line-strong: rgba(245,241,226,.24);
  --primary: #DCEB4E; --primary-strong: #C8D63C; --on-primary: #143524;
  --accent: #F5F1E2; --accent-ink: #143524; --under: #DCEB4E; --over: #F0A95D;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
  --shadow-md: 0 2px 8px rgba(0,0,0,.35), 0 18px 40px rgba(0,0,0,.3);
}

* { box-sizing: border-box; }
.gg-app {
  font-family: var(--font); background: var(--bg); color: var(--ink);
  height: 100%; width: 100%; position: relative; overflow: hidden;
  -webkit-font-smoothing: antialiased; display: flex; flex-direction: column;
  font-variant-numeric: tabular-nums;
}
.gg-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.gg-scroll::-webkit-scrollbar { width: 0; height: 0; }
.tnum { font-variant-numeric: tabular-nums; }
.expanded { font-stretch: 125%; }

@keyframes gg-screen-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.gg-screen { animation: gg-screen-in .34s var(--ease); }
@keyframes gg-pop { 0% { transform: scale(.82); opacity: .4; } 60% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
.gg-pop { animation: gg-pop .26s var(--ease); }
@media (prefers-reduced-motion: reduce) { .gg-screen, .gg-pop { animation: none !important; } }

/* ── splash fallback: auto-hide after 8s if JS fails ── */
@keyframes gg-splash-out { to { opacity: 0; pointer-events: none; visibility: hidden; } }
#gg-splash { animation: gg-splash-out 0.5s 8s ease forwards; }

/* ── page scaffold ── */
html, body { margin: 0; }
html { background: #0E3D2A; }
body {
  font-family: 'Archivo', system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center; min-height: 100vh;
}
#stage { flex: 1; width: 100%; display: flex; align-items: stretch; }
#phone-scaler { flex: 1; display: flex; }
#root { flex: 1; display: flex; }
.variant-bar {
  display: flex; gap: 6px; align-items: center;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  border-radius: 999px; padding: 5px; margin: 0 0 20px; backdrop-filter: blur(8px);
}
.variant-bar button {
  border: none; cursor: pointer; border-radius: 999px; padding: 9px 16px;
  font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13.5px;
  background: transparent; color: rgba(255,255,255,.6); transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.variant-bar button.on { background: #fff; color: #161a17; }
.variant-bar .vlabel {
  color: rgba(255,255,255,.4); font-size: 11px; font-weight: 800;
  letter-spacing: .12em; text-transform: uppercase; padding: 0 8px 0 10px;
}
</style>
</head>
<body>
<div id="gg-splash" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#0E3D2A;transition:opacity .45s cubic-bezier(.22,1,.36,1);font-family:'Archivo',system-ui,sans-serif;">
  <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
    <rect width="72" height="72" rx="18" fill="#DCEB4E" opacity=".15"/>
    <line x1="33" y1="16" x2="33" y2="58" stroke="#F5F1E2" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M33 17 L54 26 L33 35Z" fill="#DCEB4E"/>
    <ellipse cx="33" cy="58" rx="9" ry="3.5" fill="#82997f" opacity=".5"/>
  </svg>
  <div style="text-align:center">
    <div style="font-weight:900;font-size:34px;font-stretch:expanded;letter-spacing:-.02em;color:#F5F1E2">Grinder</div>
    <div style="font-weight:600;font-size:12px;color:#b9caba;margin-top:5px;letter-spacing:.1em;text-transform:uppercase">Golf Scorecard</div>
  </div>
</div>
<script>
(function(){
  try {
    var t = localStorage.getItem('gg_theme') || 'links';
    var bg = t==='fairway'?'#E9EFE8':t==='midnight'?'#0A120E':'#0E3D2A';
    var ink = t==='fairway'?'#112019':'#F5F1E2';
    var soft = t==='fairway'?'#586a60':'#b9caba';
    var prim = t==='fairway'?'#11824A':t==='midnight'?'#2ECC71':'#DCEB4E';
    var s = document.getElementById('gg-splash');
    s.style.background = bg;
    s.querySelector('rect').setAttribute('fill', prim);
    s.querySelector('path').setAttribute('fill', prim);
    s.querySelectorAll('line,ellipse')[0].setAttribute('stroke', ink);
    s.querySelectorAll('div')[0].style.color = ink;
    s.querySelectorAll('div')[1].style.color = soft;
  } catch(e) {}
})();
</script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-src="ios-frame.jsx?v=4">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-src="grinder-logic.jsx?v=4">
// grinder-logic.jsx — pure data + scoring helpers (no UI)
// Exposed on window for the other babel scripts.

/* ════════════════════════════════════════════════════════════
   SUPABASE SCHEMA (suggested) — the JS round object below maps
   1:1 so wiring this up later is a thin layer.

   table courses
     id           uuid pk default gen_random_uuid()
     name         text not null
     location     text
     pars         int[]            -- 18 entries, hole 1..18
     created_at   timestamptz default now()

   table rounds
     id           uuid pk default gen_random_uuid()
     user_id      uuid references auth.users
     course_id    uuid references courses(id)   -- null if custom
     course_name  text not null                 -- denormalised label
     holes        int  not null                 -- 3 | 6 | 9 | 18
     pars         int[] not null
     mode_par     bool default false            -- show vs-par
     mode_stbl    bool default false            -- stableford on
     status       text default 'live'           -- 'live' | 'done'
     started_at   timestamptz default now()
     finished_at  timestamptz

   table players          -- players within a round
     id           uuid pk default gen_random_uuid()
     round_id     uuid references rounds(id) on delete cascade
     name         text not null
     seat         int                            -- order 0..n

   table scores
     id           uuid pk default gen_random_uuid()
     round_id     uuid references rounds(id) on delete cascade
     player_id    uuid references players(id) on delete cascade
     hole         int not null                   -- 1..18
     strokes      int                            -- null = not played
     unique (player_id, hole)

   RLS: every table filtered on user_id = auth.uid().
   ════════════════════════════════════════════════════════════ */

// ── Course presets ───────────────────────────────────────────
const PAR_TEMPLATE = [4, 4, 3, 5, 4, 4, 3, 4, 5, 4, 3, 4, 5, 4, 4, 3, 4, 5];

const COURSES = [
  { id: 'eichenhof', name: 'Eichenhof GC',     location: 'Hügelland',   pars: [4,4,3,5,4,3,4,5,4, 4,3,5,4,4,3,4,5,4] },
  { id: 'seeblick',  name: 'Seeblick Links',   location: 'am See',      pars: [4,5,4,3,4,4,5,3,4, 5,4,3,4,5,4,3,4,4] },
  { id: 'tannenpark',name: 'Tannenpark',       location: 'Waldrand',    pars: [3,4,4,5,4,3,4,4,5, 4,4,3,5,4,3,4,4,5] },
  { id: 'heidehof',  name: 'Heidehof Resort',  location: 'Heide',       pars: [5,4,4,3,5,4,3,4,4, 4,5,3,4,4,4,3,5,4] },
];

// ── Build the par list for the chosen number of holes ────────
function buildPars(course, holes) {
  const base = (course && course.pars) ? course.pars : PAR_TEMPLATE;
  const out = [];
  for (let i = 0; i < holes; i++) out.push(base[i % base.length]);
  return out;
}

// ── Stableford (gross, no handicap) ──────────────────────────
// 2 pts at par, +1 per stroke under, -1 per stroke over, floored at 0.
function stableford(strokes, par) {
  if (strokes == null) return 0;
  return Math.max(0, 2 - (strokes - par));
}

// ── Per-player totals across played holes ────────────────────
function totals(scores, pars) {
  let strokes = 0, parPlayed = 0, stbl = 0, played = 0;
  for (let h = 0; h < pars.length; h++) {
    const s = scores[h];
    if (s == null) continue;
    strokes += s;
    parPlayed += pars[h];
    stbl += stableford(s, pars[h]);
    played += 1;
  }
  return { strokes, parPlayed, stbl, played, toPar: strokes - parPlayed };
}

// ── Formatting ───────────────────────────────────────────────
function fmtToPar(n) {
  if (n === 0) return 'E';
  return n > 0 ? `+${n}` : `${n}`;
}

// name of a score relative to par (for the live chip)
function scoreName(strokes, par) {
  if (strokes == null) return null;
  const d = strokes - par;
  if (strokes === 1) return 'Hole-in-One';
  if (d <= -3) return 'Albatross';
  if (d === -2) return 'Eagle';
  if (d === -1) return 'Birdie';
  if (d === 0) return 'Par';
  if (d === 1) return 'Bogey';
  if (d === 2) return 'Double';
  return `+${d}`;
}

// colour token for a score pill
function scoreTone(strokes, par) {
  if (strokes == null) return 'none';
  const d = strokes - par;
  if (d < 0) return 'under';
  if (d === 0) return 'par';
  return 'over';
}

// ── Local persistence (stand-in for Supabase) ────────────────
const LS_HISTORY = 'gg_history_v1';
const LS_LIVE = 'gg_live_v1';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY) || '[]'); }
  catch (e) { return []; }
}
function saveHistory(arr) {
  try { localStorage.setItem(LS_HISTORY, JSON.stringify(arr)); } catch (e) {}
}
function pushHistory(round) {
  const arr = loadHistory();
  arr.unshift(round);
  saveHistory(arr.slice(0, 50));
}
function loadLive() {
  try { return JSON.parse(localStorage.getItem(LS_LIVE) || 'null'); }
  catch (e) { return null; }
}
function saveLive(round) {
  try {
    if (round) localStorage.setItem(LS_LIVE, JSON.stringify(round));
    else localStorage.removeItem(LS_LIVE);
  } catch (e) {}
}

function uid() { return Math.random().toString(36).slice(2, 10); }

function relTime(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'gerade eben';
  if (d < 3600) return `vor ${Math.floor(d/60)} Min`;
  if (d < 86400) return `vor ${Math.floor(d/3600)} Std`;
  const days = Math.floor(d / 86400);
  if (days === 1) return 'gestern';
  if (days < 7) return `vor ${days} Tagen`;
  return new Date(ts).toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
}

Object.assign(window, {
  COURSES, PAR_TEMPLATE, buildPars, stableford, totals,
  fmtToPar, scoreName, scoreTone,
  loadHistory, saveHistory, pushHistory, loadLive, saveLive, uid, relTime,
});

</script>

// ── Button ───────────────────────────────────────────────────
function Btn({ children, onClick, variant = 'primary', size = 'md', icon, disabled, style }) {
  const sizes = {
    sm: { padding: '9px 14px', fontSize: 14, radius: 12 },
    md: { padding: '14px 18px', fontSize: 16, radius: 16 },

  const base = {

  const variants = {

  return (

// ── Segmented control ────────────────────────────────────────
function Seg({ options, value, onChange, style }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: `repeat(${options.length}, 1fr)`,
      gap: 4, background: 'var(--surface-2)', borderRadius: 16, padding: 4, ...style,
    }}>
      {options.map((o) => {
        const v = typeof o === 'object' ? o.value : o;
        const label = typeof o === 'object' ? o.label : o;
        const active = v === value;
        return (
          <button key={v} onClick={() => onChange(v)} style={{
            border: 'none', cursor: 'pointer', borderRadius: 12, padding: '11px 6px',

// ── Big stepper — the core score input (big tap targets) ─────
function BigStepper({ value, onChange, min = 1, max = 15, accent, big = true }) {
  const tone = accent || 'var(--primary)';
  const btn = (dir, ic) => (
    <button
      onClick={() => onChange(Math.max(min, Math.min(max, (value ?? 0) + dir)))}
      onPointerDown={(e) => { e.currentTarget.style.transform = 'scale(.9)'; }}
      onPointerUp={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
      onPointerLeave={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}

        borderRadius: '50%', border: '1.5px solid var(--line-strong)',
        background: 'var(--surface-2)', color: 'var(--ink)',
        display: 'grid', placeItems: 'center', cursor: 'pointer',
        transition: 'transform .1s var(--ease)', WebkitTapHighlightColor: 'transparent',
      }}>

  return (

        minWidth: big ? 64 : 44, textAlign: 'center',

}

// ── Score pill (under/par/over) ──────────────────────────────
function ScorePill({ strokes, par, style }) {
  const tone = scoreTone(strokes, par);
  if (tone === 'none') return null;
  const map = {
    under: { bg: 'color-mix(in srgb, var(--under) 16%, transparent)', fg: 'var(--under)' },
    par:   { bg: 'var(--surface-2)', fg: 'var(--ink-soft)' },
    over:  { bg: 'color-mix(in srgb, var(--over) 15%, transparent)', fg: 'var(--over)' },
  }[tone];
  return (
    <span style={{
      fontSize: 12.5, fontWeight: 800, letterSpacing: '.02em',
      padding: '4px 9px', borderRadius: 8, background: map.bg, color: map.fg,
      whiteSpace: 'nowrap', ...style,
    }}>{scoreName(strokes, par)}</span>
  );
}

// ── Section label ────────────────────────────────────────────
function Label({ children, style }) {
  return (
    <div style={{
      fontSize: 12.5, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase',
      color: 'var(--ink-faint)', ...style,
    }}>{children}</div>

// avatar with initials
function Avatar({ name, i = 0, size = 34 }) {
  const palette = ['var(--primary)', 'var(--over)', '#3E7CB1', '#9B6FB0', '#C99A2E', '#3FA796', '#D26A8A', '#5E8C4B'];
  const c = palette[i % palette.length];
  const init = (name || '?').trim().slice(0, 1).toUpperCase() || '?';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: `color-mix(in srgb, ${c} 20%, transparent)`, color: c,
      display: 'grid', placeItems: 'center', fontWeight: 800, fontSize: size * .42,
    }}>{init}</div>
  );
}

Object.assign(window, { Icon, Btn, Seg, Card, BigStepper, ScorePill, Label, Avatar });

<script type="text/babel" data-src="grinder-setup.jsx?v=4">
// grinder-setup-play.jsx — Setup + Play screens
const { useState: useS, useRef: useR, useEffect: useE } = React;

// shared top bar
function TopBar({ left, title, sub, right }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '8px 16px 14px', minHeight: 52,
    }}>
      <div style={{ width: 44, display: 'flex', justifyContent: 'flex-start' }}>{left}</div>
      <div style={{ flex: 1, textAlign: 'center', lineHeight: 1.1 }}>
        {title && <div style={{ fontWeight: 800, fontSize: 17 }}>{title}</div>}
        {sub && <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', fontWeight: 600, marginTop: 1 }}>{sub}</div>}
      </div>
      <div style={{ width: 44, display: 'flex', justifyContent: 'flex-end' }}>{right}</div>
    </div>
  );
}

function RoundIconBtn({ icon, onClick, tone }) {
  return (
    <button onClick={onClick} style={{
      width: 42, height: 42, borderRadius: '50%', border: 'none', cursor: 'pointer',
      background: 'var(--surface)', color: tone || 'var(--ink)', boxShadow: 'var(--shadow-sm)',
      display: 'grid', placeItems: 'center', WebkitTapHighlightColor: 'transparent',
    }}><Icon name={icon} size={20} /></button>
  );
}

/* ── Haversine distance in km ───────────────────────────── */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ══════════════════════════ SETUP ══════════════════════════ */
function SetupScreen({ onStart, onHistory, hasHistory, maxPlayers = 8 }) {
  const [players, setPlayers] = useS(['Spieler 1']);
  const [courseId, setCourseId] = useS(COURSES[0].id);
  const [custom, setCustom] = useS('');
  const [holes, setHoles] = useS(9);
  const [modePar, setModePar] = useS(true);
  const [modeStbl, setModeStbl] = useS(false);
  const [nearbyCourses, setNearbyCourses] = useS([]);
  const [geoState, setGeoState] = useS('idle'); // idle | loading | done | denied | error

  const isCustom = courseId === 'custom';
  const isNearby = courseId.startsWith('nearby-');
  const staticCourse = COURSES.find(c => c.id === courseId);
  const nearbyCourse = nearbyCourses.find(c => c.id === courseId);
  const course = staticCourse || nearbyCourse;
  const courseName = isCustom ? (custom.trim() || 'Eigener Platz') : (course ? course.name : COURSES[0].name);
  const validNames = players.map(p => p.trim()).filter(Boolean);
  const canStart = validNames.length > 0;

  const setName = (i, v) => setPlayers(p => p.map((x, j) => j === i ? v : x));
  const addPlayer = () => players.length < maxPlayers && setPlayers(p => [...p, `Spieler ${p.length + 1}`]);
  const rmPlayer = (i) => setPlayers(p => p.filter((_, j) => j !== i));

  const findNearby = () => {
    if (!navigator.geolocation) { setGeoState('error'); return; }
    setGeoState('loading');
    navigator.geolocation.getCurrentPosition(
      async ({ coords }) => {
        const { latitude: lat, longitude: lon } = coords;
        const q = `[out:json][timeout:15];(way["leisure"="golf_course"](around:30000,${lat},${lon});relation["leisure"="golf_course"](around:30000,${lat},${lon}););out center 20;`;
        try {
          const res = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST', body: q,
          });
          const data = await res.json();
          const courses = data.elements
            .filter(el => el.center || (el.lat && el.lon))
            .map(el => {
              const clat = el.center ? el.center.lat : el.lat;
              const clon = el.center ? el.center.lon : el.lon;
              const dist = haversine(lat, lon, clat, clon);
              const name = el.tags?.name || el.tags?.['name:de'] || 'Golfplatz';
              return { id: `nearby-${el.id}`, name, location: `${dist.toFixed(1)} km entfernt`, dist, pars: null };
            })
            .sort((a, b) => a.dist - b.dist)
            .slice(0, 3);
          setNearbyCourses(courses);
          setGeoState('done');
          if (courses.length > 0) setCourseId(courses[0].id);
        } catch {
          setGeoState('error');
        }
      },
      (err) => setGeoState(err.code === 1 ? 'denied' : 'error'),
      { timeout: 10000 }
    );
  };

  const start = () => {
    if (!canStart) return;
    const names = players.map(p => p.trim()).filter(Boolean);
    const resolvedCourse = isNearby ? nearbyCourse : (isCustom ? null : course);
    const pars = buildPars(resolvedCourse, holes);
    const pl = names.map(n => ({ id: uid(), name: n }));
    const scores = {};
    pl.forEach(p => { scores[p.id] = Array(holes).fill(null); });
    onStart({
      id: uid(), courseId: isCustom ? null : courseId, courseName,
      location: isCustom ? '' : (course ? course.location : ''),
      holes, pars, modePar, modeStbl, players: pl, scores,
      currentHole: 0, startedAt: Date.now(), status: 'live',
    });
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--ink)', fontFamily: 'var(--font)', fontVariantNumeric: 'tabular-nums', WebkitFontSmoothing: 'antialiased' }}>
      <div className="gg-screen" style={{ padding: '52px 18px 20px' }}>

        {/* wordmark */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 26 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
              <div style={{ width: 34, height: 34, borderRadius: 10, background: 'var(--primary)', color: 'var(--on-primary)', display: 'grid', placeItems: 'center' }}>
                <Icon name="flag" size={20} sw={2.4} />
              </div>
              <div className="expanded" style={{ fontWeight: 900, fontSize: 30, letterSpacing: '-.01em', lineHeight: 1 }}>GRINDER</div>
            </div>
            <div style={{ color: 'var(--ink-soft)', fontWeight: 600, fontSize: 14, marginTop: 7 }}>Neue Runde aufsetzen</div>
          </div>
          {hasHistory && <RoundIconBtn icon="clock" onClick={onHistory} />}
        </div>

        {/* players */}
        <Label style={{ marginBottom: 10 }}>Wer spielt mit?</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
          {players.map((name, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 12, background: 'var(--surface)',
              borderRadius: 16, padding: '8px 8px 8px 14px', boxShadow: 'var(--shadow-sm)',
            }}>
              <Avatar name={name} i={i} />
              <input value={name} onChange={e => setName(i, e.target.value)} placeholder={`Spieler ${i + 1}`}
                style={{
                  flex: 1, border: 'none', background: 'transparent', outline: 'none',
                  fontFamily: 'var(--font)', fontWeight: 700, fontSize: 16, color: 'var(--ink)',
                }} />
              {players.length > 1 && (
                <button onClick={() => rmPlayer(i)} style={{
                  width: 34, height: 34, borderRadius: '50%', border: 'none', cursor: 'pointer',
                  background: 'var(--surface-2)', color: 'var(--ink-faint)', display: 'grid', placeItems: 'center',
                }}><Icon name="x" size={16} sw={2.4} /></button>
              )}
            </div>
          ))}
        </div>
        {players.length < maxPlayers && (
          <button onClick={addPlayer} style={{
            width: '100%', border: '1.5px dashed var(--line-strong)', background: 'transparent',
            color: 'var(--ink-soft)', borderRadius: 16, padding: '13px', cursor: 'pointer',
            fontFamily: 'var(--font)', fontWeight: 700, fontSize: 15,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: 26,
            whiteSpace: 'nowrap',
          }}><Icon name="plus" size={18} sw={2.6} /> Spieler hinzufügen</button>
        )}

        {/* course */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <Label>Platz</Label>
          <button onClick={findNearby} disabled={geoState === 'loading'} style={{
            display: 'flex', alignItems: 'center', gap: 6, border: 'none', cursor: 'pointer',
            background: 'var(--surface)', borderRadius: 99, padding: '6px 12px 6px 10px',
            color: geoState === 'error' ? 'var(--over)' : 'var(--primary)',
            fontFamily: 'var(--font)', fontWeight: 700, fontSize: 13, boxShadow: 'var(--shadow-sm)',
            WebkitTapHighlightColor: 'transparent', opacity: geoState === 'loading' ? .6 : 1,
          }}>
            <Icon name={geoState === 'loading' ? 'loader' : 'map-pin'} size={15} sw={2.4} />
            {geoState === 'loading' ? 'Suche…' : geoState === 'denied' ? 'Zugriff verweigert' : geoState === 'error' ? 'Fehler' : geoState === 'done' ? 'Aktualisieren' : 'In der Nähe'}
          </button>
        </div>

        {nearbyCourses.length > 0 && (
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink-faint)', letterSpacing: '.1em', textTransform: 'uppercase', padding: '0 4px', marginBottom: 8 }}>
            Nahe bei dir
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: nearbyCourses.length > 0 ? 16 : 26 }}>
          {nearbyCourses.map(c => {
            const active = c.id === courseId;
            return (
              <button key={c.id} onClick={() => setCourseId(c.id)} style={{
                display: 'flex', alignItems: 'center', gap: 13, textAlign: 'left',
                background: 'var(--surface)', border: 'none', cursor: 'pointer',
                borderRadius: 16, padding: 14,
                boxShadow: active ? 'inset 0 0 0 2px var(--primary), var(--shadow-sm)' : 'var(--shadow-sm)',
                WebkitTapHighlightColor: 'transparent',
              }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: 'var(--surface-2)', color: 'var(--primary)', display: 'grid', placeItems: 'center' }}>
                  <Icon name="map-pin" size={19} sw={2.2} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{c.name}</div>
                  <div style={{ fontSize: 13, color: 'var(--ink-soft)', fontWeight: 600 }}>{c.location}</div>
                </div>
                <div style={{
                  width: 22, height: 22, borderRadius: '50%', display: 'grid', placeItems: 'center',
                  background: active ? 'var(--primary)' : 'transparent', color: 'var(--on-primary)',
                  boxShadow: active ? 'none' : 'inset 0 0 0 2px var(--line-strong)',
                }}>{active && <Icon name="check" size={14} sw={3} />}</div>
              </button>
            );
          })}
        </div>

        {nearbyCourses.length > 0 && (
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink-faint)', letterSpacing: '.1em', textTransform: 'uppercase', padding: '0 4px', marginBottom: 8 }}>
            Alle Plätze
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 26 }}>
          {COURSES.map(c => {
            const active = c.id === courseId;
            return (
              <button key={c.id} onClick={() => setCourseId(c.id)} style={{
                display: 'flex', alignItems: 'center', gap: 13, textAlign: 'left',
                background: 'var(--surface)', border: 'none', cursor: 'pointer',
                borderRadius: 16, padding: 14, boxShadow: active ? 'inset 0 0 0 2px var(--primary), var(--shadow-sm)' : 'var(--shadow-sm)',
                WebkitTapHighlightColor: 'transparent',
              }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: 'var(--surface-2)', color: 'var(--primary)', display: 'grid', placeItems: 'center' }}>
                  <Icon name="flag" size={19} sw={2.2} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{c.name}</div>
                  <div style={{ fontSize: 13, color: 'var(--ink-soft)', fontWeight: 600 }}>{c.location} · Par {c.pars.reduce((a,b)=>a+b,0)}</div>
                </div>
                <div style={{
                  width: 22, height: 22, borderRadius: '50%', display: 'grid', placeItems: 'center',
                  background: active ? 'var(--primary)' : 'transparent', color: 'var(--on-primary)',
                  boxShadow: active ? 'none' : 'inset 0 0 0 2px var(--line-strong)',
                }}>{active && <Icon name="check" size={14} sw={3} />}</div>
              </button>
            );
          })}
          <button onClick={() => setCourseId('custom')} style={{
            display: 'flex', alignItems: 'center', gap: 13, textAlign: 'left',
            background: 'var(--surface)', border: 'none', cursor: 'pointer',
            borderRadius: 16, padding: isCustom ? '14px 14px 8px' : 14,
            boxShadow: isCustom ? 'inset 0 0 0 2px var(--primary), var(--shadow-sm)' : 'var(--shadow-sm)',
            flexDirection: isCustom ? 'column' : 'row', alignItems: isCustom ? 'stretch' : 'center',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 13 }}>
              <div style={{ width: 38, height: 38, borderRadius: 11, background: 'var(--surface-2)', color: 'var(--primary)', display: 'grid', placeItems: 'center' }}>
                <Icon name="plus" size={19} sw={2.4} />
              </div>
              <div style={{ flex: 1, fontWeight: 800, fontSize: 16 }}>Eigener Platz</div>
            </div>
            {isCustom && (
              <input autoFocus value={custom} onChange={e => setCustom(e.target.value)} placeholder="Platzname eingeben…"
                onClick={e => e.stopPropagation()}
                style={{
                  marginTop: 10, width: '100%', border: 'none', borderTop: '1px solid var(--line)',
                  background: 'transparent', outline: 'none', padding: '10px 2px 2px',
                  fontFamily: 'var(--font)', fontWeight: 700, fontSize: 15, color: 'var(--ink)',
                }} />
            )}
          </button>
        </div>

        {/* holes */}
        <Label style={{ marginBottom: 10 }}>Wie viele Löcher?</Label>
        <Seg style={{ marginBottom: 26 }}
          options={[{ value: 3, label: '3' }, { value: 6, label: '6' }, { value: 9, label: '9' }, { value: 18, label: '18' }]}
          value={holes} onChange={setHoles} />

        {/* scoring modes */}
        <Label style={{ marginBottom: 10 }}>Zählweise</Label>
        <Card pad={4} style={{ marginBottom: 8 }}>
          <ModeRow label="Schläge zählen" sub="Immer aktiv" locked checked />
          <div style={{ height: 1, background: 'var(--line)', margin: '0 14px' }} />
          <ModeRow label="Par-Vergleich" sub="Zeigt +/– zum Par je Loch" checked={modePar} onToggle={() => setModePar(v => !v)} />
          <div style={{ height: 1, background: 'var(--line)', margin: '0 14px' }} />
          <ModeRow label="Stableford" sub="Punkte statt nur Schläge" checked={modeStbl} onToggle={() => setModeStbl(v => !v)} />
        </Card>
        <div style={{ fontSize: 12.5, color: 'var(--ink-faint)', fontWeight: 600, padding: '2px 6px', marginBottom: 100 }}>
          Tipp: Zählweise lässt sich nur vor dem Start wählen.
        </div>
      </div>

      {/* sticky start */}
      <div style={{
        position: 'sticky', bottom: 0, padding: '14px 18px 30px',
        background: 'linear-gradient(to top, var(--bg) 62%, transparent)',
      }}>
        <Btn size="lg" onClick={start} disabled={!canStart} icon="flag" style={{ whiteSpace: 'nowrap' }}>
          Runde starten · {holes} Löcher
        </Btn>
      </div>
    </div>
  );
}

function ModeRow({ label, sub, checked, onToggle, locked }) {
  return (
    <div onClick={locked ? undefined : onToggle} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '13px 14px',
      cursor: locked ? 'default' : 'pointer', WebkitTapHighlightColor: 'transparent',
    }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 700, fontSize: 15.5, color: locked ? 'var(--ink-soft)' : 'var(--ink)' }}>{label}</div>
        <div style={{ fontSize: 12.5, color: 'var(--ink-faint)', fontWeight: 600, marginTop: 1 }}>{sub}</div>
      </div>
      <div style={{
        width: 50, height: 30, borderRadius: 99, padding: 3, flexShrink: 0,
        background: checked ? 'var(--primary)' : 'var(--line-strong)',
        opacity: locked ? .55 : 1, transition: 'background .2s var(--ease)',
        display: 'flex', justifyContent: checked ? 'flex-end' : 'flex-start',
      }}>
        <div style={{ width: 24, height: 24, borderRadius: '50%', background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,.25)', transition: 'all .2s var(--ease)' }} />
      </div>
    </div>
  );
}

window.SetupScreen = SetupScreen;
window.TopBar = TopBar;
window.RoundIconBtn = RoundIconBtn;

</script>
<script type="text/babel" data-src="grinder-play.jsx?v=4">
// grinder-play.jsx — Play screen: hole-by-hole + full scorecard
const { useState: useSp, useEffect: useEp } = React;

function PlayScreen({ round, setRound, onFinish, onExit }) {
  const [view, setView] = useSp('hole'); // 'hole' | 'card'
  const h = round.currentHole;
  const N = round.holes;
  const par = round.pars[h];

  const setHole = (i) => setRound(r => ({ ...r, currentHole: Math.max(0, Math.min(N - 1, i)) }));
  const setScore = (pid, val) => setRound(r => {
    const sc = { ...r.scores, [pid]: r.scores[pid].slice() };
    sc[pid][h] = val;
    return { ...r, scores: sc };
  });
  const setPar = (val) => setRound(r => {
    const pars = r.pars.slice(); pars[h] = val; return { ...r, pars };
  });

  const allScored = round.players.every(p => round.scores[p.id][h] != null);
  const isLast = h === N - 1;

  return (
    <div className="gg-app">
      <TopBar
        left={<RoundIconBtn icon="x" onClick={onExit} />}
        title={round.courseName}
        sub={`${N} Löcher${round.location ? ' · ' + round.location : ''}`}
        right={<RoundIconBtn icon={view === 'hole' ? 'cards' : 'flag'} onClick={() => setView(v => v === 'hole' ? 'card' : 'hole')} />}
      />
      {view === 'hole'
        ? <HoleView round={round} h={h} par={par} setScore={setScore} setPar={setPar} setHole={setHole} />
        : <CardView round={round} onPick={(i) => { setHole(i); setView('hole'); }} />}

      {/* footer */}
      <div style={{ padding: '12px 18px 30px', background: 'linear-gradient(to top, var(--bg) 70%, transparent)' }}>
        {view === 'hole' ? (
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            <button onClick={() => setHole(h - 1)} disabled={h === 0} style={navBtn(h === 0)}>
              <Icon name="left" size={22} sw={2.6} />
            </button>
            {isLast
              ? <Btn size="lg" variant="accent" icon="trophy" onClick={onFinish} style={{ flex: 1 }}>Runde beenden</Btn>
              : <Btn size="lg" onClick={() => setHole(h + 1)} style={{ flex: 1 }}>
                  {allScored ? 'Weiter zu Loch ' + (h + 2) : 'Weiter'}
                  <Icon name="right" size={20} sw={2.6} />
                </Btn>}
          </div>
        ) : (
          <Btn size="lg" variant="accent" icon="trophy" onClick={onFinish}>Runde beenden</Btn>
        )}
      </div>
    </div>
  );
}

function navBtn(disabled) {
  return {
    width: 58, height: 58, flexShrink: 0, borderRadius: 18, border: 'none',
    background: 'var(--surface)', color: disabled ? 'var(--ink-faint)' : 'var(--ink)',
    boxShadow: 'var(--shadow-sm)', cursor: disabled ? 'default' : 'pointer',
    display: 'grid', placeItems: 'center', opacity: disabled ? .5 : 1,
    WebkitTapHighlightColor: 'transparent',
  };
}

/* ─── one hole at a time ─── */
function HoleView({ round, h, par, setScore, setPar, setHole }) {
  const N = round.holes;
  return (
    <div className="gg-scroll" style={{ padding: '0 18px 8px' }}>
      {/* hole header */}
      <div key={h} className="gg-screen" style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 16,
      }}>
        <div>
          <Label>Loch</Label>
          <div className="expanded tnum" style={{ fontWeight: 900, fontSize: 60, lineHeight: .95, letterSpacing: '-.02em' }}>
            {h + 1}<span style={{ color: 'var(--ink-faint)', fontSize: 26, fontWeight: 800 }}>/{N}</span>
          </div>
        </div>
        {/* par stepper */}
        <div style={{ textAlign: 'center', background: 'var(--surface)', borderRadius: 'var(--r-md)', padding: '10px 12px', boxShadow: 'var(--shadow-sm)' }}>
          <Label style={{ marginBottom: 6 }}>Par</Label>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <button onClick={() => setPar(Math.max(3, par - 1))} style={parBtn}><Icon name="minus" size={15} sw={3} /></button>
            <div className="tnum" style={{ width: 24, textAlign: 'center', fontWeight: 800, fontSize: 24 }}>{par}</div>
            <button onClick={() => setPar(Math.min(6, par + 1))} style={parBtn}><Icon name="plus" size={15} sw={3} /></button>
          </div>
        </div>
      </div>

      {/* progress dots */}
      <div style={{ display: 'flex', gap: 5, marginBottom: 18, flexWrap: 'wrap' }}>
        {Array.from({ length: N }).map((_, i) => {
          const done = round.players.some(p => round.scores[p.id][i] != null);
          const cur = i === h;
          return (
            <button key={i} onClick={() => setHole(i)} style={{
              flex: 1, minWidth: 8, height: 6, borderRadius: 99, border: 'none', cursor: 'pointer', padding: 0,
              background: cur ? 'var(--primary)' : done ? 'color-mix(in srgb, var(--primary) 40%, var(--surface-2))' : 'var(--surface-2)',
              transition: 'background .2s',
            }} />
          );
        })}
      </div>

      {/* players */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {round.players.map((p, i) => {
          const sc = round.scores[p.id];
          const t = totals(sc, round.pars);
          const cur = sc[h];
          return (
            <div key={p.id} className="gg-pop" style={{
              background: 'var(--surface)', borderRadius: 'var(--r-lg)', padding: '12px 14px',
              boxShadow: 'var(--shadow-sm)',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
                <Avatar name={p.name} i={i} size={36} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 800, fontSize: 16, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 2 }}>
                    <span style={{ fontSize: 12.5, color: 'var(--ink-soft)', fontWeight: 700 }}>
                      Ges. {t.strokes || '–'}
                    </span>
                    {round.modePar && t.played > 0 && (
                      <span style={{ fontSize: 12.5, fontWeight: 800, color: t.toPar > 0 ? 'var(--over)' : 'var(--under)' }}>
                        {fmtToPar(t.toPar)}
                      </span>
                    )}
                    {round.modeStbl && t.played > 0 && (
                      <span style={{ fontSize: 12.5, color: 'var(--ink-soft)', fontWeight: 700 }}>· {t.stbl} Pkt</span>
                    )}
                  </div>
                </div>
                {round.modePar && <ScorePill strokes={cur} par={par} />}
              </div>
              <div style={{ display: 'flex', justifyContent: 'center', marginTop: 8 }}>
                <BigStepper value={cur} onChange={(v) => setScore(p.id, v)} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const parBtn = {
  width: 30, height: 30, borderRadius: '50%', border: '1.5px solid var(--line-strong)',
  background: 'var(--surface-2)', color: 'var(--ink)', display: 'grid', placeItems: 'center',
  cursor: 'pointer', WebkitTapHighlightColor: 'transparent',
};

/* ─── full scorecard table ─── */
function CardView({ round, onPick }) {
  const cols = round.players;
  const cellW = cols.length <= 2 ? 64 : cols.length <= 4 ? 48 : 40;
  return (
    <div className="gg-scroll gg-screen" style={{ padding: '0 14px 8px' }}>
      <div style={{ background: 'var(--surface)', borderRadius: 'var(--r-lg)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
        {/* header */}
        <div style={{ display: 'flex', alignItems: 'stretch', background: 'var(--surface-2)', padding: '10px 12px', gap: 8 }}>
          <div style={{ width: 30, fontWeight: 800, fontSize: 12, color: 'var(--ink-soft)' }}>LOCH</div>
          <div style={{ width: 28, fontWeight: 800, fontSize: 12, color: 'var(--ink-soft)', textAlign: 'center' }}>PAR</div>
          <div style={{ flex: 1, display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
            {cols.map((p, i) => (
              <div key={p.id} style={{ width: cellW, textAlign: 'center' }}>
                <Avatar name={p.name} i={i} size={26} />
              </div>
            ))}
          </div>
        </div>
        {/* rows */}
        {round.pars.map((par, hi) => (
          <button key={hi} onClick={() => onPick(hi)} style={{
            display: 'flex', alignItems: 'center', width: '100%', textAlign: 'left',
            border: 'none', background: hi === round.currentHole ? 'color-mix(in srgb, var(--primary) 8%, var(--surface))' : 'var(--surface)',
            borderTop: '1px solid var(--line)', padding: '11px 12px', gap: 8, cursor: 'pointer',
            WebkitTapHighlightColor: 'transparent',
          }}>
            <div style={{ width: 30, fontWeight: 800, fontSize: 15 }}>{hi + 1}</div>
            <div style={{ width: 28, textAlign: 'center', fontWeight: 700, fontSize: 14, color: 'var(--ink-soft)' }}>{par}</div>
            <div style={{ flex: 1, display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
              {cols.map(p => {
                const s = round.scores[p.id][hi];
                const tone = scoreTone(s, par);
                const tc = tone === 'under' ? 'var(--under)' : tone === 'over' ? 'var(--over)' : 'var(--ink)';
                return (
                  <div key={p.id} className="tnum" style={{
                    width: cellW, textAlign: 'center', fontWeight: 800, fontSize: 17,
                    color: s == null ? 'var(--ink-faint)' : tc,
                  }}>{s == null ? '·' : s}</div>
                );
              })}
            </div>
          </button>
        ))}
        {/* total row */}
        <div style={{ display: 'flex', alignItems: 'center', background: 'var(--surface-2)', padding: '12px', gap: 8, borderTop: '2px solid var(--line-strong)' }}>
          <div style={{ width: 30, fontWeight: 800, fontSize: 13 }}>GES</div>
          <div style={{ width: 28, textAlign: 'center', fontWeight: 800, fontSize: 13, color: 'var(--ink-soft)' }}>
            {round.pars.reduce((a, b) => a + b, 0)}
          </div>

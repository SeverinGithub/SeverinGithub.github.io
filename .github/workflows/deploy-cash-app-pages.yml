name: Deploy cash-app folder to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cash-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cash-app

      - name: Build cash-app
        run: npm run build
        working-directory: cash-app

      - name: Prepare Pages artifact
        run: |
          rm -rf .site
          mkdir -p .site
          rsync -a --exclude '.git' --exclude '.github' ./ .site/
          rm -rf .site/cash-app
          mkdir -p .site/cash-app
          cp -R cash-app/dist/. .site/cash-app/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
